<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Psychologie du Handicap · BUT1 S2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f0;
  --muted: #6b6b80;
  --moteur: #ff6b35;
  --auditif: #4ecdc4;
  --visuel: #a78bfa;
  --good: #34d399;
  --bad: #f87171;
  --radius: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* ── BRAIN DECOR ── */
.brain-left, .brain-right {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 220px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 2;
  filter: drop-shadow(0 0 18px #00e5ff) drop-shadow(0 0 40px #00b4d8);
  animation: brainPulse 4s ease-in-out infinite;
}
.brain-left  { left: -30px; }
.brain-right { right: -30px; transform: translateY(-50%) scaleX(-1); }

@keyframes brainPulse {
  0%, 100% { opacity: 0.18; filter: drop-shadow(0 0 18px #00e5ff) drop-shadow(0 0 40px #00b4d8); }
  50%       { opacity: 0.30; filter: drop-shadow(0 0 30px #00e5ff) drop-shadow(0 0 70px #00b4d8) drop-shadow(0 0 10px #fff); }
}

@media (max-width: 900px) {
  .brain-left, .brain-right { display: none; }
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
}

/* ── HERO ── */
.hero {
  position: relative;
  padding: 5rem 2rem 3rem;
  text-align: center;
  overflow: hidden;
}

.hero-glow {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  border-radius: 99px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 1.5rem;
  background: var(--surface);
}

.hero-badge span { color: var(--visuel); }

.hero h1 {
  font-size: clamp(2.2rem, 6vw, 4.2rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 0.8rem;
}

.hero h1 em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--visuel);
}

.hero-sub {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 400;
  margin-bottom: 2.5rem;
}

/* ── MODULE SELECTOR ── */
.module-selector {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 1rem 3rem;
}

.module-btn {
  position: relative;
  padding: 1rem 1.8rem;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.3rem;
  min-width: 160px;
  overflow: hidden;
}

.module-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

.module-btn.moteur::before { background: linear-gradient(135deg, rgba(255,107,53,0.1), transparent); }
.module-btn.auditif::before { background: linear-gradient(135deg, rgba(78,205,196,0.1), transparent); }
.module-btn.visuel::before { background: linear-gradient(135deg, rgba(167,139,250,0.1), transparent); }

.module-btn:hover::before, .module-btn.active::before { opacity: 1; }

.module-btn.active.moteur { border-color: var(--moteur); }
.module-btn.active.auditif { border-color: var(--auditif); }
.module-btn.active.visuel { border-color: var(--visuel); }

.module-icon { font-size: 1.4rem; }
.module-label { font-size: 0.75rem; color: var(--muted); font-weight: 400; }

.module-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  position: absolute;
  top: 0.7rem; right: 0.7rem;
}
.moteur .module-dot { background: var(--moteur); }
.auditif .module-dot { background: var(--auditif); }
.visuel .module-dot { background: var(--visuel); }

/* ── QUIZ CONTAINER ── */
.quiz-wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 1.5rem 6rem;
  display: none;
}

.quiz-wrap.visible { display: block; }

/* Progress bar */
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}

.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 2.5rem;
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.moteur-theme .progress-fill { background: var(--moteur); }
.auditif-theme .progress-fill { background: var(--auditif); }
.visuel-theme .progress-fill { background: var(--visuel); }

/* Question card */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.2rem;
  margin-bottom: 1rem;
  animation: fadeUp 0.35s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 0.9rem;
  text-transform: uppercase;
}

.q-number span.accent-moteur { color: var(--moteur); }
.q-number span.accent-auditif { color: var(--auditif); }
.q-number span.accent-visuel { color: var(--visuel); }

.q-text {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 1.6rem;
  letter-spacing: -0.01em;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
}

.option {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.2rem;
  background: var(--surface2);
  border: 1.5px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s;
  font-size: 0.93rem;
  font-weight: 500;
  text-align: left;
  width: 100%;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  position: relative;
  overflow: hidden;
}

.option:hover:not(:disabled) {
  border-color: var(--border);
  transform: translateX(4px);
  background: rgba(255,255,255,0.04);
}

.option-letter {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  flex-shrink: 0;
  transition: all 0.18s;
}

.option.correct {
  background: rgba(52,211,153,0.08);
  border-color: var(--good);
  color: var(--good);
}

.option.correct .option-letter {
  background: var(--good);
  color: #000;
}

.option.wrong {
  background: rgba(248,113,113,0.08);
  border-color: var(--bad);
  color: var(--bad);
}

.option.wrong .option-letter {
  background: var(--bad);
  color: #000;
}

.option.reveal-correct {
  background: rgba(52,211,153,0.05);
  border-color: rgba(52,211,153,0.3);
  color: var(--good);
}

.option:disabled { cursor: default; }

/* Explanation */
.explanation {
  background: var(--surface2);
  border-left: 3px solid var(--good);
  border-radius: 0 10px 10px 0;
  padding: 1rem 1.2rem;
  margin-top: 1rem;
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.6;
  animation: fadeUp 0.3s ease both;
  display: none;
}

.explanation.show { display: block; }
.explanation strong { color: var(--text); }

/* Nav buttons */
.quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
}

.btn-next {
  padding: 0.75rem 1.8rem;
  border-radius: 10px;
  border: none;
  background: var(--text);
  color: var(--bg);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  display: none;
  letter-spacing: 0.02em;
}

.btn-next:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-next.show { display: block; }

.score-inline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--muted);
}

/* ── SCORE SCREEN ── */
.score-screen {
  text-align: center;
  padding: 3rem 2rem;
  animation: fadeUp 0.5s ease both;
  display: none;
}

.score-screen.visible { display: block; }

.score-ring {
  width: 140px; height: 140px;
  border-radius: 50%;
  margin: 0 auto 1.5rem;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 3px solid var(--border);
  background: var(--surface);
  position: relative;
}

.score-ring svg {
  position: absolute;
  top: -3px; left: -3px;
  width: 146px; height: 146px;
  transform: rotate(-90deg);
}

.score-ring circle {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.score-num {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
}

.score-denom {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--muted);
}

.score-title {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.score-msg {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 2rem;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
}

.btn-retry {
  padding: 0.8rem 2rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  margin: 0.4rem;
}

.btn-retry:hover { background: var(--surface2); }

/* ── REVIEW LIST ── */
.review-list {
  margin-top: 2rem;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.review-item {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  padding: 0.8rem 1rem;
  background: var(--surface);
  border-radius: 10px;
  font-size: 0.85rem;
  line-height: 1.5;
}

.review-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.1rem; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

/* Mobile tweaks */
@media (max-width: 500px) {
  .hero { padding: 3rem 1.2rem 2rem; }
  .question-card { padding: 1.4rem; }
  .module-btn { min-width: 130px; }
}
</style>
</head>

<script>
const QUIZZES = {
  moteur: {
    color: 'var(--moteur)',
    accent: 'accent-moteur',
    label: 'Handicap moteur',
    questions: [
      {
        q: "Quelle est la définition du handicap moteur ?",

        exp: "Deux types de facteurs interviennent : les facteurs propres à la déficience (degré de perte, âge d'apparition) et les facteurs environnementaux (support parental, statut auditif des parents, méthode d'éducation et prise en charge)."

let currentQuiz = null;
let currentQ = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function startQuiz(theme) {
  // Reset all
  document.querySelectorAll('.quiz-wrap').forEach(el => {
    el.classList.remove('visible');
    el.innerHTML = '';
  });
  document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.module-btn.${theme}`).classList.add('active');

  currentQuiz = theme;
  currentQ = 0;
  score = 0;
  answered = false;
  userAnswers = [];

  const wrap = document.getElementById(`quiz-${theme}`);
  wrap.classList.add('visible');
  renderQuestion(theme, wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderQuestion(theme, wrap) {
  const quiz = QUIZZES[theme];
  const total = quiz.questions.length;
  const q = quiz.questions[currentQ];
  const pct = (currentQ / total) * 100;
  const letters = ['A', 'B', 'C', 'D'];

  wrap.innerHTML = `
    <div class="progress-header">
      <span class="progress-label">Question <span style="color:${quiz.color}">${currentQ + 1}</span> / ${total}</span>
      <span class="score-inline">Score : ${score} / ${currentQ}</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width: ${pct}%"></div>
    </div>
    <div class="question-card">
      <div class="q-number">Q${String(currentQ + 1).padStart(2,'0')} &nbsp;·&nbsp; <span class="${quiz.accent}">${quiz.label}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((opt, i) => `
          <button class="option" onclick="answer(${i})" id="opt-${i}">
            <span class="option-letter">${letters[i]}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="exp">${q.exp}</div>
    </div>
    <div class="quiz-nav">
      <div></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">${currentQ < total - 1 ? 'Question suivante →' : 'Voir les résultats →'}</button>
    </div>
  `;
  answered = false;
}

function answer(idx) {
  if (answered) return;
  answered = true;

  const quiz = QUIZZES[currentQuiz];
  const q = quiz.questions[currentQ];
  const correct = q.ans;
  const isRight = idx === correct;
  if (isRight) score++;
  userAnswers.push({ question: q.q, chosen: idx, correct: correct, right: isRight });

  const opts = document.querySelectorAll('.option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === idx && isRight) btn.classList.add('correct');
    else if (i === idx && !isRight) btn.classList.add('wrong');
    else if (i === correct && !isRight) btn.classList.add('reveal-correct');
  });

  document.getElementById('exp').classList.add('show');
  document.getElementById('btn-next').classList.add('show');

  // update score inline
  const total = quiz.questions.length;
  document.querySelector('.score-inline').textContent = `Score : ${score} / ${currentQ + 1}`;
}

function nextQuestion() {
  currentQ++;
  const theme = currentQuiz;
  const wrap = document.getElementById(`quiz-${theme}`);
  const total = QUIZZES[theme].questions.length;

  if (currentQ >= total) {
    showScore(theme, wrap);
  } else {
    renderQuestion(theme, wrap);
  }
}

function showScore(theme, wrap) {
  const quiz = QUIZZES[theme];
  const total = quiz.questions.length;
  const pct = Math.round((score / total) * 100);
  const circumference = 2 * Math.PI * 68;
  const offset = circumference - (pct / 100) * circumference;

  const msgs = [
    [0, 40, "Retourne aux diapos, courage ! 💪"],
    [40, 60, "Pas mal, encore quelques révisions..."],
    [60, 80, "Bien joué ! Tu maîtrises bien le sujet."],
    [80, 101, "Excellent ! Tu es prêt·e pour l'exam. 🎉"]
  ];
  const msg = msgs.find(([min, max]) => pct >= min && pct < max)[2];

  const reviewHTML = userAnswers.map((a, i) => `
    <div class="review-item">
      <span class="review-icon">${a.right ? '✅' : '❌'}</span>
      <span><strong>Q${i+1}</strong> — ${a.right ? 'Correct' : `Attendu : <em>${quiz.questions[i].opts[a.correct]}</em>`}</span>
    </div>
  `).join('');

  wrap.innerHTML = `
    <div class="score-screen visible">
      <div class="score-ring">
        <svg viewBox="0 0 146 146">
          <circle cx="73" cy="73" r="68" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>
          <circle cx="73" cy="73" r="68" stroke="${quiz.color}" stroke-width="3"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            id="score-circle"/>
        </svg>
        <div class="score-num">${score}</div>
        <div class="score-denom">/ ${total}</div>
      </div>
      <div class="score-title">${pct} %</div>
      <div class="score-msg">${msg}</div>
      <button class="btn-retry" onclick="startQuiz('${theme}')">Recommencer ce module</button>
      <button class="btn-retry" onclick="pickAnother('${theme}')">Changer de module</button>
      <div class="review-list">${reviewHTML}</div>
    </div>
  `;

  setTimeout(() => {
    const circle = document.getElementById('score-circle');
    if (circle) circle.style.strokeDashoffset = offset;
  }, 100);
}

function pickAnother(current) {
  document.getElementById(`quiz-${current}`).classList.remove('visible');
  document.getElementById(`quiz-${current}`).innerHTML = '';
  document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.module-selector').scrollIntoView({ behavior: 'smooth', block: 'center' });
}
</script>
